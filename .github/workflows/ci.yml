name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Enable toolchain auto-download
        run: echo "GOTOOLCHAIN=auto" >> $GITHUB_ENV

      - name: Go version
        run: go version

      - name: Build
        run: go build -v ./cmd/bugbuster/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...
