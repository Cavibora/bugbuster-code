# Key bindings (unspecified keys use defaults)
# keys:
#   send: ["enter"]              # Send message
#   newline: ["shift+enter", "alt+enter", "ctrl+j"]  # New line (Shift+Enter in Kitty terminals, Ctrl+J everywhere)
#   cancel: ["ctrl+c"]           # Cancel streaming / exit
#   interrupt: ["esc"]            # Interrupt streaming / exit
#   history_up: ["up"]            # History navigation up
#   history_down: ["down"]        # History navigation down
#   scroll_up: ["pgup", "ctrl+u"]   # Scroll up
#   scroll_down: ["pgdown", "ctrl+d"] # Scroll down

# MCP servers (Model Context Protocol)
mcp:
  servers:
    filesystem:
      type: stdio
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "/tmp"
      enabled: true

    # SSE server example
    # remote-api:
    #   type: sse
    #   url: https://api.example.com/mcp/sse
    #   headers:
    #     Authorization: "Bearer ${MCP_API_TOKEN}"
    #   enabled: false

    # Streamable HTTP server example
    # remote-http:
    #   type: streamable-http
    #   url: https://api.example.com/mcp
    #   headers:
    #     Authorization: "Bearer ${MCP_API_TOKEN}"
    #   enabled: false

# Plugins (three types: builtins, Go .so, MCP)
plugins:
  # Built-in plugins (filesystem, bash, web)
  builtins:
    - filesystem
    - bash
    - web
  config:
    filesystem:
      allowed_dirs:
        - /tmp
        - /home
      max_file_size: 1048576
      max_grep_results: 50
      max_glob_results: 100
    bash:
      timeout: 30
      blocked_commands:
        - rm -rf /
        - mkfs
      allow_network: false
      default_dir: ""
    web:
      allow_network: true
      timeout: 15
      max_body_size: 524288

  # External Go plugins (.so files)
  # go:
  #   - name: my-plugin
  #     path: /path/to/myplugin.so
  #     config:
  #       key: value

  # MCP plugins (any language)
