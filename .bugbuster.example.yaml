default_provider: zai

providers:
  zai:
    type: anthropic
    base_url: https://api.z.ai/api/anthropic
    api_key: ${ZAI_API_KEY}
    model: glm-5.1
    max_tokens: 16384         # max output tokens (API-запрос), 0 = дефолт 16384
    context_window: 200000    # размер контекстного окна модели (для компакции)
    budget_tokens: 4096       # budget_tokens для thinking (Anthropic)
    temperature: 0.7           # температура сэмплирования (0.0-2.0)
    top_p: 0.95               # top-p сэмплирование (0.0-1.0)
    top_k: 0                  # top-k сэмплирование (0 = не передаётся)
    security:
      allow_network: true
      blocked_commands:
        - rm -rf /

  local:
    type: anthropic
    base_url: http://localhost:8180/api
    api_key: ${LOCAL_API_KEY}
    model: glm-5.1:clode
    max_tokens: 16384
    context_window: 180000
    budget_tokens: 4096
    security:
      allow_network: true

  ollama:
    type: ollama
    base_url: http://192.168.0.106:11434
    model: deepseek-v4-pro:cloud
    max_tokens: 16384
    context_window: 32000
    security:
      allow_network: false

agent:
  max_tokens: 180000          # fallback для context_window если не указан в провайдере
  keep_recent: 6
  verbose: false
  permission_mode: auto-approve
  language: ru
  request_timeout: 1200      # макс. время одного LLM-запроса в секундах (default: 1200 = 20 мин)
  thinking_timeout: 600      # макс. время без токенов от модели в секундах (default: 600 = 10 мин)
  idle_timeout: 300          # таймаут стриминга без событий в секундах (default: 300 = 5 мин)
  loop_detection:            # настройки детекции зацикливания
    repeat_threshold: 6       # сколько одинаковых вызовов подряд = зацикливание (default: 6)
    tool_repeat_threshold: 8  # сколько вызовов одного инструмента с теми же параметрами = зацикливание (default: 8)
    window_size: 30            # размер скользящего окна (default: 30)
    text_similarity_threshold: 0.65  # порог сходства текстов 0.0-1.0 (default: 0.65)
    text_similarity_window: 4         # сколько текстовых ответов проверять на сходство (default: 4)

tools:
  allowed_dirs: []
  max_file_size: 1048576
  bash_timeout: 30
  max_grep_results: 50
  max_glob_results: 100

security:
  allow_network: false
  blocked_commands:
    - rm -rf /
    - mkfs
    - dd if=
    - format c:
  sandbox_dir: ""

# Тема оформления (dark по умолчанию)
# theme:
#   mode: dark              # dark | light
#   word_wrap: 80           # перенос слов в markdown (0 = без переноса)
#   colors:
#     primary: cyan          # спиннер, заголовки tool calls
#     success: green         # ✓, create, добавления в diff
#     error: red             # ✗, ошибки, удаления в diff
#     warning: yellow        # предупреждения, modify в diff
#     info: blue             # токены входящие
#     dim: "244"             # приглушённый текст (ANSI 256-color)
#     thinking: "244"        # thinking-блок
#     tool_params: cyan      # параметры tool call
#     tool_summary: "244"    # сводка результата tool call
#     status_time: "244"     # ⏱ время в статусе
#     status_separator: "244"  # │ разделитель в статусе
#     context_bar_good: green   # контекст < 50%
#     context_bar_warn: yellow  # контекст 50-80%
#     context_bar_bad: red      # контекст > 80%
#     user_message: "#04B575"  # ❯ пользовательский ввод (TUI)
#     assistant: "#7D56F4"     # спиннер/статус ассистента (TUI)
#     separator: "#3C3C3C"     # ─── разделитель
#   # Формат цветов: ANSI имя (red/green/cyan...), 256-color номер ("244"), hex ("#04B575")

# Клавиатурные привязки (неуказанные — по умолчанию)
# keys:
#   send: ["enter"]              # Отправить запрос
#   newline: ["shift+enter", "alt+enter", "ctrl+j"]  # Перенос строки (Shift+Enter в терминалах с Kitty Protocol, Ctrl+J — везде)
#   cancel: ["ctrl+c"]           # Отмена стриминга / выход
#   interrupt: ["esc"]            # Прервать стриминг / выход
#   history_up: ["up"]            # Навигация по истории вверх
#   history_down: ["down"]        # Навигация по истории вниз
#   scroll_up: ["pgup", "ctrl+u"]   # Скролл вверх
#   scroll_down: ["pgdown", "ctrl+d"] # Скролл вниз

# MCP-серверы (Model Context Protocol)
mcp:
  servers:
    filesystem:
      type: stdio
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "/tmp"
      enabled: true

    # Пример SSE-сервера
    # remote-api:
    #   type: sse
    #   url: https://api.example.com/mcp/sse
    #   headers:
    #     Authorization: "Bearer ${MCP_API_TOKEN}"
    #   enabled: false

    # Пример streamable-http сервера
    # remote-http:
    #   type: streamable-http
    #   url: https://api.example.com/mcp
    #   headers:
    #     Authorization: "Bearer ${MCP_API_TOKEN}"
    #   enabled: false

# Плагины (три типа: builtins, Go .so, MCP)
plugins:
  # Встроенные плагины (filesystem, bash, web)
  builtins:
    - filesystem
    - bash
    - web
  config:
    filesystem:
      allowed_dirs:
        - /tmp
        - /home
      max_file_size: 1048576
      max_grep_results: 50
      max_glob_results: 100
    bash:
      timeout: 30
      blocked_commands:
        - rm -rf /
        - mkfs
      allow_network: false
      default_dir: ""
    web:
      allow_network: true
      timeout: 15
      max_body_size: 524288

  # Внешние Go-плагины (.so файлы)
  # go:
  #   - name: my-plugin
  #     path: /path/to/myplugin.so
  #     config:
  #       key: value

  # MCP-плагины (всеядные, любой язык)
