# GoReleaser configuration for BugBuster Code
# https://goreleaser.com

version: 2

before:
  hooks: []

builds:
  - id: bugbuster
    main: ./cmd/bugbuster/
    binary: bugbuster
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"

archives:
  - id: bugbuster
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^build:'
      - 'merge conflict'
      - 'Merge pull request'
  groups:
    - title: '🚀 Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 10
    - title: '🐛 Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 20
    - title: '📝 Documentation'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 30
    - title: '🔧 Other'
      order: 99

release:
  github:
    owner: Cavibora
    name: bugbuster-code
  draft: false
  prerelease: auto
  name_template: "BugBuster Code {{.Version}}"
  header: |
    ## 🚀 What's New

    See [CHANGELOG.md](https://github.com/Cavibora/bugbuster-code/blob/main/CHANGELOG.md) for full details.

    ### Install

    ```bash
    # Homebrew (macOS / Linux)
    brew install Cavibora/tap/bugbuster

    # Or download from assets below
    tar xzf bugbuster_{{.Version}}_*.tar.gz
    sudo mv bugbuster /usr/local/bin/

    # Or build from source
    go install github.com/Cavibora/bugbuster-code/cmd/bugbuster@latest
    ```

