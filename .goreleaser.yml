# GoReleaser configuration for BugBuster Code
# https://goreleaser.com

before:
  hooks: []

builds:
  - id: bugbuster
    main: ./cmd/bugbuster/
    binary: bugbuster
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: bugbuster
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^build:'
      - 'merge conflict'
      - 'Merge pull request'
  groups:
    - title: '🚀 Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 10
    - title: '🐛 Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 20
    - title: '📝 Documentation'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 30
    - title: '🔧 Other'
      order: 99

release:
  github:
    owner: Cavibora
    name: bugbuster-code
  draft: false
  prerelease: auto
  name_template: "BugBuster Code {{.Version}}"
  header: |
    ## 🚀 What's New

    See [CHANGELOG.md](https://github.com/Cavibora/bugbuster-code/blob/main/CHANGELOG.md) for full details.

    ### Install

    ```bash
    # Homebrew (macOS / Linux)
    brew install Cavibora/tap/bugbuster

    # Scoop (Windows)
    scoop bucket add Cavibora https://github.com/Cavibora/scoop-bucket
    scoop install bugbuster

    # Or download from assets below
    tar xzf bugbuster_{{.Version}}_*.tar.gz
    sudo mv bugbuster /usr/local/bin/

    # Or build from source
    go install github.com/Cavibora/bugbuster-code/cmd/bugbuster@latest
    ```

brews:
  - name: bugbuster
    repository:
      owner: Cavibora
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: .
    homepage: "https://github.com/Cavibora/bugbuster-code"
    description: "Model-agnostic AI coding agent for your terminal"
    license: MIT
    test: |
      system "#{bin}/bugbuster", "--version"
    install: |
      bin.install "bugbuster"

scoops:
  - name: bugbuster
    repository:
      owner: Cavibora
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Cavibora/bugbuster-code"
    description: "Model-agnostic AI coding agent for your terminal"
    license: MIT

nfpms:
  - id: bugbuster
    package_name: bugbuster
    homepage: "https://github.com/Cavibora/bugbuster-code"
    description: "Model-agnostic AI coding agent for your terminal"
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    maintainer: "Cavibora <bugbuster@cavibora.com>"