# GoReleaser configuration for BugBuster Code
# https://goreleaser.com

before:
  hooks:
    - go mod tidy

builds:
  - id: bugbuster
    main: ./cmd/bugbuster/
    binary: bugbuster
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: bugbuster
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^build:'
      - 'merge conflict'
      - 'Merge pull request'

release:
  github:
    owner: Cavibora
    name: bugbuster-code
  draft: false
  prerelease: auto
  name_template: "BugBuster Code {{.Version}}"
  header: |
    ## 🚀 What's New

    See [CHANGELOG.md](https://github.com/Cavibora/bugbuster-code/blob/main/CHANGELOG.md) for full details.

    ### Install

    ```bash
    # macOS / Linux (download from assets below)
    tar xzf bugbuster_1.2.0_*.tar.gz
    sudo mv bugbuster /usr/local/bin/

    # Or build from source
    go install github.com/Cavibora/bugbuster-code/cmd/bugbuster@latest
    ```